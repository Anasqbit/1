kind = "web"
previewPath = "/"
title = "Arabic/English Keyboard Translator"
version = "1.0.0"
id = "artifacts/keyboard-translator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24618
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/keyboard-translator run dev"

[services.env]
PORT = "24618"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/keyboard-translator", "run", "build"]
publicDir = "artifacts/keyboard-translator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
